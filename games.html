<!DOCTYPE html>
<html>
<head>
<title>Ultimate Game Portal</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

#gameFrame{
width:900px;
height:500px;
border:none;
margin-top:20px;
border-radius:10px;
}

#search{
padding:10px;
width:300px;
margin-top:20px;
border-radius:5px;
border:none;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.game{
cursor:pointer;
background:#1a1a1a;
padding:10px;
border-radius:10px;
transition:0.2s;
}

.game:hover{
background:#333;
transform:scale(1.1);
}

.game img{
width:100px;
height:100px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>🎮 Ultimate Game Portal</h1>

<a href="index.html" style="color:cyan;">⬅ Back</a>

<br>

<input id="search" placeholder="Search games...">

<br>

<iframe id="gameFrame"></iframe>

<div class="games" id="gameList"></div>

<script>

const games = [

{name:"Run",url:"https://ubg100.github.io/run/",icon:"https://img.icons8.com/fluency/96/running.png"},
{name:"Run 3",url:"https://ubg100.github.io/run-3/",icon:"https://img.icons8.com/fluency/96/running.png"},
{name:"Slope",url:"https://ubg100.github.io/slope/",icon:"https://img.icons8.com/fluency/96/controller.png"},
{name:"2048",url:"https://ubg100.github.io/2048/",icon:"https://img.icons8.com/fluency/96/numbered-list.png"},
{name:"Drift Boss",url:"https://ubg100.github.io/drift-boss/",icon:"https://img.icons8.com/fluency/96/racing-flag.png"},
{name:"Basketball Stars",url:"https://ubg100.github.io/basketball-stars/",icon:"https://img.icons8.com/fluency/96/basketball.png"},
{name:"Retro Bowl",url:"https://ubg100.github.io/retro-bowl/",icon:"https://img.icons8.com/fluency/96/american-football.png"},
{name:"Moto X3M",url:"https://ubg100.github.io/moto-x3m/",icon:"https://img.icons8.com/fluency/96/motorcycle.png"},
{name:"Tunnel Rush",url:"https://ubg100.github.io/tunnel-rush/",icon:"https://img.icons8.com/fluency/96/controller.png"},
{name:"Stickman Hook",url:"https://ubg100.github.io/stickman-hook/",icon:"https://img.icons8.com/fluency/96/stick-figure.png"},

{name:"Crossy Road",url:"https://ubg100.github.io/crossy-road/",icon:"https://img.icons8.com/fluency/96/chicken.png"},
{name:"Flappy Bird",url:"https://ubg100.github.io/flappy-bird/",icon:"https://img.icons8.com/fluency/96/bird.png"},
{name:"Snake",url:"https://ubg100.github.io/snake/",icon:"https://img.icons8.com/fluency/96/snake.png"},
{name:"Tiny Fishing",url:"https://ubg100.github.io/tiny-fishing/",icon:"https://img.icons8.com/fluency/96/fishing.png"},
{name:"Paper.io",url:"https://ubg100.github.io/paper-io/",icon:"https://img.icons8.com/fluency/96/paper.png"},
{name:"Drive Mad",url:"https://ubg100.github.io/drive-mad/",icon:"https://img.icons8.com/fluency/96/car.png"},
{name:"OvO",url:"https://ubg100.github.io/ovo/",icon:"https://img.icons8.com/fluency/96/controller.png"},
{name:"Basket Random",url:"https://ubg100.github.io/basket-random/",icon:"https://img.icons8.com/fluency/96/basketball.png"},
{name:"Soccer Random",url:"https://ubg100.github.io/soccer-random/",icon:"https://img.icons8.com/fluency/96/soccer-ball.png"},
{name:"Fireboy Watergirl",url:"https://ubg100.github.io/fireboy-watergirl/",icon:"https://img.icons8.com/fluency/96/fire-element.png"},

{name:"Minecraft Classic",url:"https://ubg100.github.io/minecraft-classic/",icon:"https://img.icons8.com/fluency/96/minecraft-logo.png"},
{name:"Geometry Dash",url:"https://ubg100.github.io/geometry-dash/",icon:"https://img.icons8.com/fluency/96/square.png"},
{name:"Stack",url:"https://ubg100.github.io/stack/",icon:"https://img.icons8.com/fluency/96/stack.png"},
{name:"Fruit Ninja",url:"https://ubg100.github.io/fruit-ninja/",icon:"https://img.icons8.com/fluency/96/watermelon.png"},
{name:"Run 2",url:"https://ubg100.github.io/run-2/",icon:"https://img.icons8.com/fluency/96/running.png"},
{name:"Slope 2",url:"https://ubg100.github.io/slope-2/",icon:"https://img.icons8.com/fluency/96/controller.png"},
{name:"Tank Trouble",url:"https://ubg100.github.io/tank-trouble/",icon:"https://img.icons8.com/fluency/96/tank.png"},
{name:"Stick War",url:"https://ubg100.github.io/stick-war/",icon:"https://img.icons8.com/fluency/96/sword.png"},
{name:"Age of War",url:"https://ubg100.github.io/age-of-war/",icon:"https://img.icons8.com/fluency/96/castle.png"},
{name:"Learn to Fly",url:"https://ubg100.github.io/learn-to-fly/",icon:"https://img.icons8.com/fluency/96/penguin.png"}

];

const list = document.getElementById("gameList");

function showGames(filter=""){
list.innerHTML="";
games
.filter(g=>g.name.toLowerCase().includes(filter.toLowerCase()))
.forEach(game=>{
const div=document.createElement("div");
div.className="game";
div.innerHTML=`<img src="${game.icon}"><br>${game.name}`;
div.onclick=()=>{document.getElementById("gameFrame").src=game.url};
list.appendChild(div);
});
}

showGames();

document.getElementById("search").addEventListener("input",e=>{
showGames(e.target.value);
});

</script>

</body>
</html>
